[pytest]
# Test discovery and execution
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Markers for test categorization
markers =
    xwai_core: Core functionality and integration tests
    xwai_unit: Unit tests for individual components
    xwai_integration: Integration tests across modules
    xwai_advance: Advance quality tests (v1.0.0+)
    xwai_security: Security excellence tests (Priority #1)
    xwai_usability: Usability excellence tests (Priority #2)
    xwai_maintainability: Maintainability excellence tests (Priority #3)
    xwai_performance: Performance excellence tests (Priority #4)
    xwai_extensibility: Extensibility excellence tests (Priority #5)

# Test output configuration
addopts =
    -v
    --tb=short
    --strict-markers
    -x

